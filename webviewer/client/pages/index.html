<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NeuralMimicry AARNN Visualiser</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon & Manifest -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

    <link rel="stylesheet" href="style.css">
</head>
<body>
<header role="banner">
    <!-- Clickable logo linking to neuralmimicry.ai -->
    <a href="https://neuralmimicry.ai" target="_blank" rel="noopener" class="logo-link">
        <img src="/favicon-32x32.png" alt="NeuralMimicry" width="32" height="32">
    </a>
    <p>
        <span class="visually-hidden">NeuralMimicry </span>
        <strong>AARNN</strong> Visualiser
    </p>
    <div class="subtitle">
        Use mouse/touch to rotate, scroll to zoom, drag to pan.
    </div>
</header>

<main>
    <!-- Loading overlay initially visible for connection state. Classes controlled by JS. -->
    <div id="loadingOverlay" role="status" aria-live="polite" class="d-flex">
        <div class="spinner" aria-hidden="true"></div>
        <div id="loadingText">Connecting to server...</div>
        <!-- PROGRESS BAR: hidden until loading JSON -->
        <div id="progressContainer" class="d-none">
            <progress id="dataProgress" max="100" value="0"></progress>
            <span id="progressText">0%</span>
        </div>
    </div>

    <!-- Three.js will inject a <canvas> inside this container -->
    <div id="threeContainer" aria-label="3D rendering area"></div>

    <!-- Mini‐viewport -->
    <div id="miniViewport">
        <div id="miniHeader">
            <span>Drag me</span>
            <button id="dockToggle" title="Dock/Undock">⇆</button>
        </div>
        <canvas id="miniCanvas"></canvas>
    </div>
</main>

<footer role="contentinfo">
    <!-- Graphic equaliser: shows inbound rate (green) vs backlog (red) -->
    <div id="dataEqualiser" aria-label="Data throughput indicator">
        <!-- bars injected by JS -->
    </div>
    <span id="statusMessage">Status: Not connected</span>
</footer>

<!-- Three.js (ESM build) -->
<script type="module" src="visualiser.js"></script>
</body>
</html>
