<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NeuralMimicry AARNN Visualiser</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon & Manifest (you can adjust or remove if not needed) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

    <link rel="stylesheet" href="style.css">
</head>
<body>
<header role="banner">
    AARNN Network Visualiser
    <div class="subtitle"> <!-- Replaced inline style with class -->
        Use mouse/touch to rotate, scroll to zoom, drag to pan.
    </div>
</header>

<main>
    <!-- Loading overlay initially visible for connection state. Classes controlled by JS. -->
    <div id="loadingOverlay" role="status" aria-live="polite" class="d-flex"> <!-- Added d-flex for initial state -->
        <div class="spinner" aria-hidden="true"></div>
        <div id="loadingText">Connecting to server...</div>
        <!-- PROGRESS BAR: hidden until we start loading actual JSON -->
        <div id="progressContainer" class="d-none"> <!-- Added d-none for initial hidden state -->
            <progress id="dataProgress" max="100" value="0"></progress> <!-- Removed inline style -->
            <span id="progressText">0%</span> <!-- Removed inline style -->
        </div>
    </div>

    <!-- Three.js will inject a <canvas> inside this container -->
    <div id="threeContainer" aria-label="3D rendering area"></div>
</main>

<footer role="contentinfo">
    <span id="statusMessage">Status: Not connected</span>
</footer>

<!-- Three.js (ESM build) -->
<script type="module" src="visualiser.js"></script>
</body>
</html>
